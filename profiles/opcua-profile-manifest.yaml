        "description": "<b>Note: This Facet has been deprecated in v1.05, because it only adds limits and in 1.05 we require limits to be described in the product documentation.</b><br><br>\nThis Facet specifies an enhanced support of subscribing to data changes. It is part of the Standard UA Server 2017 Profile. This Facet increases the limits defined by the Standard Data Change Subscription 2017 Server Facet.",
