  "manifest_purpose": "Canonical declaration of OPC UA profiles, facets, conformance units, build symbols, and capacities for muc-opcua. Seed state: reflects current repository only; no new OPC claims. See docs/superpowers/specs/2026-07-11-opc-complete-kconfig-manifest.md.",
  "metadata": {
    "superseded_profiles": [
      {
        "description": "This Profile is a collection of Facets necessary to build a functional OPC UA Server Application specifically for chip level devices with limited resources. This Profile is functionally equivalent to the Core Server Facet and defines the \"UA-TCP UA-SC UA-Binary\" as the required transport profile including an ECC Security Policy. The support of Diagnostic Objects and Variables is optional for this Profile despite it being defined as \u201cmandatory\u201d in UA Part 5. Support of Diagnostic Objects and Variables is mandatory in some higher-level Profiles. Exposing types in the AddressSpace is optional for this Profile except if custom types (i.e., types that are derived from well-known ObjectTypes, VariableTypes, ReferenceType or DataTypes) are used. Exposing all supported types in the AddressSpace is mandatory in some higher-level Profiles.<br>\nThis Profile supersedes the <a href=\"http://opcfoundation.org/UA-Profile/Server/NanoEmbeddedDevice2017\">Nano Embedded Device 2017 Server Profile</a>.",
        "display_name": "Nano Embedded Device 2022 Server Profile",
        "last_update_time": "2025-11-12T15:47:17",
        "name": "Nano Embedded Device 2022 Server Profile",
        "opc_id": 1330,
        "opc_profile_uri": "http://opcfoundation.org/UA-Profile/Server/NanoEmbeddedDevice2022",
        "release_status": 4,
        "release_status_name": "superseded",
        "source_metadata": {
          "profile_group_id": 171,
          "source_endpoint": "profile/?pg=171&all=1"
        }
      },
      {
        "description": "This Profile is a collection of Facets necessary to build a functional OPC UA Server Application for devices with more than 50 MBs of memory and a more powerful processor. This Profile builds upon the Micro Embedded Device Server Profile. Besides various enhancements, this Profile requires that Servers expose OPC-UA types in the AddressSpace.<br>\nThis Profile supersedes the <a href=\"http://opcfoundation.org/UA-Profile/Server/EmbeddedUA2017\"> Embedded 2017 UA Server Profile</a>.",
        "display_name": "Embedded 2022 UA Server Profile",
        "last_update_time": "2025-11-12T15:48:27",
        "name": "Embedded 2022 UA Server Profile",
        "opc_id": 1332,
        "opc_profile_uri": "http://opcfoundation.org/UA-Profile/Server/EmbeddedUA2022",
        "release_status": 4,
        "release_status_name": "superseded",
        "source_metadata": {
          "profile_group_id": 171,
          "source_endpoint": "profile/?pg=171&all=1"
        }
      },
      {
        "description": "This Profile is a collection of Facets necessary to build a functional OPC UA Server Application for devices like a PC.<br>\nThis Profile supersedes the <a href=\"http://opcfoundation.org/UA-Profile/Server/StandardUA2017\">Standard 2017 UA Server Profile</a>.",
        "display_name": "Standard 2022 UA Server Profile",
        "last_update_time": "2025-11-12T15:48:55",
        "name": "Standard 2022 UA Server Profile",
        "opc_id": 1333,
        "opc_profile_uri": "http://opcfoundation.org/UA-Profile/Server/StandardUA2022",
        "release_status": 4,
        "release_status_name": "superseded",
        "source_metadata": {
          "profile_group_id": 171,
          "source_endpoint": "profile/?pg=171&all=1"
        }
      },
      {
        "description": "<b>Note: This Facet has been deprecated in v1.05, because it only adds limits and in 1.05 we require limits to be described in the product documentation.</b><br><br>\nThis Facet specifies an enhanced support of subscribing to data changes. It is part of the Standard UA Server 2017 Profile. This Facet increases the limits defined by the Standard Data Change Subscription 2017 Server Facet.",
        "display_name": "Enhanced DataChange Subscription 2017 Server Facet",
        "last_update_time": "2022-10-26T05:36:01",
        "name": "Enhanced DataChange Subscription 2017 Server Facet",
        "opc_id": 1627,
        "opc_profile_uri": "http://opcfoundation.org/UA-Profile/Server/EnhancedDataChangeSubscription2017",
        "release_status": 4,
        "release_status_name": "superseded",
        "source_metadata": {
          "profile_group_id": 171,
          "source_endpoint": "profile/?pg=171&all=1"
        }
      },
      {
        "description": "<b>This User Token has been deprecated with OPC UA Specification Version 1.05.</b><br>\nThis Facet indicates that a User Token that is comprised of an issued token is supported.",
        "display_name": "User Token \u2013 Issued Token Server Facet",
        "last_update_time": "2022-03-10T16:02:39",
        "name": "User Token \u2013 Issued Token Server Facet",
        "opc_id": 1698,
        "opc_profile_uri": "http://opcfoundation.org/UA-Profile/Security/UserToken/Server/IssuedToken",
        "release_status": 4,
        "release_status_name": "superseded",
        "source_metadata": {
          "profile_group_id": 171,
          "source_endpoint": "profile/?pg=171&all=1"
        }
      },
      {
        "description": "<b>This User Token has been deprecated with OPC UA Specification Version 1.05.</b><br>\nThis Facet further refines the User Token - Issued Token to indicate a windows implementation of Kerberos",
        "display_name": "User Token \u2013 Issued Token Windows Server Facet",
        "last_update_time": "2022-03-10T16:02:49",
        "name": "User Token \u2013 Issued Token Windows Server Facet",
        "opc_id": 1699,
        "opc_profile_uri": "http://opcfoundation.org/UA-Profile/Security/UserToken/Server/IssuedTokenWindows",
        "release_status": 4,
        "release_status_name": "superseded",
        "source_metadata": {
          "profile_group_id": 171,
          "source_endpoint": "profile/?pg=171&all=1"
        }
      },
      {
        "description": "This Profile is a collection of Facets necessary to build a functional OPC UA Server Application specifically for small devices with limited resources. This Profile builds upon the Nano Embedded Device Server Profile. The most important additions is the support for subscriptions . A complete Type System is not required; however, if the Server implements any non-UA types then these types and their super-types shall be exposed.<br>\nThis Profile supersedes the <a href=\"http://opcfoundation.org/UA-Profile/Server/MicroEmbeddedDevice2017\">Micro Embedded Device 2017 Server Profile</a>.\n",
        "display_name": "Micro Embedded Device 2022 Server Profile",
        "last_update_time": "2025-11-12T15:47:49",
        "name": "Micro Embedded Device 2022 Server Profile",
        "opc_id": 2255,
        "opc_profile_uri": "http://opcfoundation.org/UA-Profile/Server/MicroEmbeddedDevice2022",
        "release_status": 4,
        "release_status_name": "superseded",
        "source_metadata": {
          "profile_group_id": 171,
          "source_endpoint": "profile/?pg=171&all=1"
        }
      }
    ]
