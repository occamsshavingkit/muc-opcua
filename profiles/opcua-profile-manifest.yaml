      {
        "description": "This Profile is a collection of Facets necessary to build a functional OPC UA Server Application for devices with more than 50 MBs of memory and a more powerful processor. This Profile builds upon the Micro Embedded Device Server Profile. Besides various enhancements, this Profile requires that Servers expose OPC-UA types in the AddressSpace.<br>\nThis Profile supersedes the <a href=\"http://opcfoundation.org/UA-Profile/Server/EmbeddedUA2017\"> Embedded 2017 UA Server Profile</a>.",
