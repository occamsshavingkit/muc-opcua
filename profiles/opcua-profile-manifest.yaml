    {
      "id": "opc_cu_5801",
      "kind": "conformance_unit",
      "opc_display_name": "Base Info Type Information",
      "kconfig_symbol": null,
      "implementation_state": "unimplemented",
      "depends_on": [],
      "profile_defaults": {
