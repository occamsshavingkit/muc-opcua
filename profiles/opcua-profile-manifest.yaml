      "kind": "conformance_unit",
      "notes": "For each Object provided in the AddressSpace of the Server the ObjectType of the Object shall be provided in the AddressSpace of the Server.\nFor each Variable provided in the AddressSpace of the Server the VariableType and the DataType of the Variable shall be provided in the AddressSpace of the Server.\nFor each Value provided by the Server, which can be a subtype of the one defined in the Variable, the DataType of the Value shall be provided in the AddressSpace of the Server.\nFor each Method Argument provided by the Server the DataType of the Value shall be provided in the AddressSpace of the Server.\nFor each Structure DataType provided by the Server, each DataType used in the Structure shall be provided in the AddressSpace of the Server. \nFor each Reference provided in the AddressSpace of the Server the ReferenceType shall be provided in the AddressSpace of the Server.\nFor each ObjectType, VariableType, ReferenceType, and DataType provided in the AddressSpace of the Server the direct supertype shall be provided in the AddressSpace of the Server. This requires that all supertypes shall be provided in the AddressSpace.\nFor each DataType having encoding information (Structured DataTypes) the Encoding Objects shall be provided in the AddressSpace of the Server.\nFor each VariableType and ObjectType provided in the AddressSpace of the Server, all InstanceDeclarations shall be provided in the AddressSpace of the Server, even if they are optional and not used in any instance of the Server.\nFor each VariableType, ObjectType and DataType all Methods, Objects and Variables that are referenced with a hierarchical Reference either from the VariableType, ObjectType or DataType or an InstanceDeclaration of the ObjectType or VariableType, either directly or indirectly, shall be provided in the AddressSpace of the Server.\nFor all Events provided by the Server, the EventType shall be provided in the AddressSpace of the Server.\n",
