      "source_metadata": {
        "profile_group_id": 171,
        "source_endpoint": "profile/?pg=171&all=1"
      },
      "notes": "This Facet defines the core functionality required for any UA Server implementation. The core functionality includes the ability to discover endpoints, establish secure communication channels, create Sessions, browse the AddressSpace and read and/or write to Attributes of Nodes. The key requirements are: support for minimum one Session, support for the core AddressSpace structure, and the Server Capabilities Object, and authentication with UserName and Password. For broad applicability, it is recommended that Servers support multiple transport and security Profiles.<br>\nIt supersedes the <a href=\"http://opcfoundation.org/UA-Profile/Server/Core2017Facet\">Core 2017 Server Facet</a>."
    },
