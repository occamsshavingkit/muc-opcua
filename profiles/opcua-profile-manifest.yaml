      {
        "description": "This Profile is a collection of Facets necessary to build a functional OPC UA Server Application specifically for small devices with limited resources. This Profile builds upon the Nano Embedded Device Server Profile. The most important additions is the support for subscriptions . A complete Type System is not required; however, if the Server implements any non-UA types then these types and their super-types shall be exposed.<br>\nThis Profile supersedes the <a href=\"http://opcfoundation.org/UA-Profile/Server/MicroEmbeddedDevice2017\">Micro Embedded Device 2017 Server Profile</a>.\n",
        "display_name": "Micro Embedded Device 2022 Server Profile",
