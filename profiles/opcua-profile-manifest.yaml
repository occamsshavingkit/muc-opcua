      },
      "backing_tests": [],
      "opc_reference": {
        "spec": "OPC-10000-7",
        "section": "4.2",
        "profile_id": "2250",
        "profile_uri": "http://opcfoundation.org/UA-Profile/Server/EmbeddedDataChangeSubscription2022",
        "source_url": "https://profiles.opcfoundation.org"
      },
      "source_metadata": {
        "profile_group_id": 171,
        "source_endpoint": "profile/?pg=171&all=1"
      },
      "notes": "This Facet specifies the minimum level of support for data change notifications within subscriptions. It minimizes memory and processing overhead required to implement the Facet. This Facet includes functionality to create, modify and delete Subscriptions and to add, modify and remove Monitored Items. It is recommended that Servers shall support one Subscription with up to two items for each Session. In addition, support for two parallel Publish requests is suggested. This Facet is geared for a platform such as the Nano or Micro Embedded Device Server Profiles in which memory is limited and will be managed.\nIt supersedes the <a href=\"http://opcfoundation.org/UA-Profile/Server/EmbeddedDataChangeSubscription\">Embedded DataChange Subscription Server Facet</a>."
    },
