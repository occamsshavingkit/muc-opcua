---
# Codacy configuration.
#
# Scope analysis to first-party source. The excluded trees are generated or
# vendored framework files we do not maintain, plus build output:
#   .specify/ , .agents/  — Spec Kit + agent-skill scaffolding (the bulk of the
#                            non-source line count; their lint findings are not ours)
#   .codex/ , .claude/    — tool/agent configuration
#   build/                — CMake build output
#   tests/interop/dotnet/{bin,obj} — generated .NET build artifacts
exclude_paths:
  - '.specify/**'
  - '.agents/**'
  - '.codex/**'
  - '.claude/**'
  - 'build/**'
  - 'tests/interop/dotnet/bin/**'
  - 'tests/interop/dotnet/obj/**'

engines:
  # Configure Cppcheck for C language (not C++).
  cppcheck:
    language: c
    exclude_paths:
      # Cppcheck analyzes this public adapter header without source-file uses,
      # which reports false unused-type/member MISRA findings.
      - 'include/muc_opcua/services/history_memstore.h'

  # Flawfinder flags raw memcpy/strlen/read in protocol serialization code.
  # Production code uses mu_checked_memcpy wrappers or guard-before-copy;
  # test/benchmark/fuzz/example code is not deployed.
  flawfinder:
    exclude_paths:
      - 'tests/**'
      - 'benchmark/**'
      - 'fuzz/**'
      - 'examples/**'

  # Lizard cyclomatic-complexity and function-length thresholds.
  # Protocol dispatch functions are naturally longer than typical application
  # code.  Test scaffolding, benchmarks, scripts, and examples inflate metrics
  # artificially and are not deployment code.
  lizard:
    exclude_paths:
      - 'tests/**'
      - 'benchmark/**'
      - 'scripts/**'
      - 'examples/**'
      # Callback-shaped history adapter matches the public HistoryRead function
      # signature; parameter-count warnings are not actionable here.
      - 'src/services/history_memstore.c'
      - 'include/muc_opcua/services/history_memstore.h'

  # Markdown link-fragment checks.  Docs links may point to sections that
  # exist in the rendered output but are generated, not in raw Markdown.
  markdownlint:
    exclude_paths:
      - '**/traceability/**'
      # Spec Kit artifacts are generated planning documents. Their table and
      # line-length style does not affect shipped documentation or code quality.
      - 'specs/**'
      # Agent planning docs (superpowers skill), same rationale as specs/**
      # above: generated working notes for a development session, not
      # shipped documentation. Their table/line-length style is not ours.
      - 'docs/superpowers/plans/**'
      # Generated conformance matrices intentionally contain long table cells
      # for OPC references and profile/test lists.
      - 'docs/conformance/opc-profile-roadmap.md'
      - 'tests/conformance/claim_test_map.md'

  # Shell scripts under scripts/ are CI infrastructure; pipeline warnings
  # are not deployment-relevant.
  shellcheck:
    exclude_paths:
      - 'scripts/**'
