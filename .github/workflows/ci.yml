name: CI

on:
  push:
    branches: [ main, "001-minimal-embedded-server" ]
  pull_request:
    branches: [ main, "001-minimal-embedded-server" ]

jobs:
  # The conformance manifest is the source of truth for every profile/facet/CU
  # claim, but nothing in CI used to look at it: a satisfied_by link pointing at
  # a Kconfig symbol instead of an item id reached main unnoticed. This job is
  # build-free so it gives fast feedback on manifest edits.
  #
  # --check-generated and --check-profiles are deliberately NOT run yet. Both
  # fail on main today for one root cause: every facet item sits in a
  # non-selectable implementation_state, so _selectable_facet_toggles() returns
  # 0 and generate_kconfig() emits ~419 lines against the 2063 committed.
  # Kconfig generation last matched at 4122c923 (2026-07-18). Turning these on
  # before that is repaired would pin CI red, so they are staged behind it --
  # see docs/conformance/generator-drift.md.
  manifest-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # NOTE: persist-credentials: false was tried here (CI-hardening review)
      # but breaks checkout on this repo: stray build directories (b/, b_*/)
      # are committed with orphaned Unity gitlinks (mode 160000) and no
      # .gitmodules, and checkout's persist-credentials=false cleanup runs
      # `git submodule foreach`, which fails on them with exit 128. Left at the
      # default until those build dirs are removed from git (tracked separately).
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install --quiet pyyaml
      - name: Validate manifest structure and reconciliation links
        run: python3 scripts/profile_manifest/validate.py --manifest profiles/opcua-profile-manifest.yaml --manifest-only
      - name: Validate claim/test coverage
        run: python3 scripts/profile_manifest/validate.py --manifest profiles/opcua-profile-manifest.yaml --check-claims
      - name: Validate capacity defaults resolve per profile
        run: python3 scripts/profile_manifest/validate.py --manifest profiles/opcua-profile-manifest.yaml --check-capacities
      - name: Manifest unit tests
        run: python3 -m unittest discover -s scripts/profile_manifest -t . -p "test_*.py" -v

  host-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential cppcheck clang-tidy clang-format libssl-dev libmbedtls-dev libwolfssl-dev
      - name: Configure CMake
        run: cmake -S . -B build/host -DCMAKE_BUILD_TYPE=Debug -DMUC_OPCUA_BUILD_TESTS=ON -DMUC_OPCUA_BUILD_EXAMPLES=ON -DMUC_OPCUA_PLATFORM=host -DMUC_OPCUA_HAVE_MBEDTLS=ON -DMUC_OPCUA_HAVE_WOLFSSL=ON -DMUC_OPCUA_PROFILE=full
      - name: Build
        run: cmake --build build/host
      - name: Test
        run: ctest --test-dir build/host --output-on-failure

  # Feature 028: run the suite against each profile's actual library so the
  # per-profile RUN_TEST gates and the claim->test checker produce real
  # per-profile conformance evidence (not just the all-features `full` build).
  profile-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [nano, micro, standard, embedded, full]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libssl-dev libmbedtls-dev libwolfssl-dev
      - name: Configure (${{ matrix.profile }})
        run: cmake -S . -B build/${{ matrix.profile }} -DCMAKE_BUILD_TYPE=Debug -DMUC_OPCUA_BUILD_TESTS=ON -DMUC_OPCUA_PLATFORM=host -DMUC_OPCUA_HAVE_MBEDTLS=ON -DMUC_OPCUA_HAVE_WOLFSSL=ON -DMUC_OPCUA_PROFILE=${{ matrix.profile }}
      - name: Build (${{ matrix.profile }})
        run: cmake --build build/${{ matrix.profile }}
      - name: Test (${{ matrix.profile }})
        run: ctest --test-dir build/${{ matrix.profile }} --output-on-failure

  interop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y cmake build-essential python3-venv
          python3 -m venv /tmp/venv && /tmp/venv/bin/pip install --quiet asyncua
      - name: Build host example
        run: cmake -S . -B build/host -DMUC_OPCUA_BUILD_EXAMPLES=ON -DMUC_OPCUA_PLATFORM=host -DMUC_OPCUA_PROFILE=full && cmake --build build/host --target minimal_server
      - name: Interop smoke test (asyncua client)
        run: PATH="/tmp/venv/bin:$PATH" tests/interop/run_interop.sh

  dotnet-interop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libssl-dev
      - name: Build host example
        run: cmake -S . -B build/host -DMUC_OPCUA_BUILD_EXAMPLES=ON -DMUC_OPCUA_PLATFORM=host -DMUC_OPCUA_PROFILE=full && cmake --build build/host --target minimal_server
      - name: OPC Foundation .NET reference-client interop
        run: tests/interop/run_interop_dotnet.sh

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang-format cppcheck clang-tidy libssl-dev
      - name: Configure CMake
        run: cmake -S . -B build/host -DMUC_OPCUA_BUILD_TESTS=ON -DMUC_OPCUA_PLATFORM=host -DMUC_OPCUA_PROFILE=full
      - name: Format Check
        run: cmake --build build/host --target format-check
      - name: CppCheck
        run: cmake --build build/host --target cppcheck
      - name: Clang-Tidy
        run: cmake --build build/host --target clang-tidy

  sanitizer-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libssl-dev libmbedtls-dev libwolfssl-dev
      - name: Configure CMake
        run: CC=clang CXX=clang++ cmake -S . -B build/asan -DMUC_OPCUA_BUILD_TESTS=ON -DMUC_OPCUA_SANITIZERS="address,undefined" -DMUC_OPCUA_PLATFORM=host -DMUC_OPCUA_HAVE_MBEDTLS=ON -DMUC_OPCUA_HAVE_WOLFSSL=ON -DMUC_OPCUA_PROFILE=full
      - name: Build
        run: cmake --build build/asan
      - name: Test
        run: ctest --test-dir build/asan --output-on-failure

  fuzz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - name: Configure CMake
        run: CC=clang CXX=clang++ cmake -S . -B build/fuzz -DMUC_OPCUA_BUILD_FUZZERS=ON -DMUC_OPCUA_PLATFORM=host -DMUC_OPCUA_PROFILE=full
      - name: Build
        run: cmake --build build/fuzz
      - name: Run fuzzers (60s each)
        run: |
          for fuzzer in build/fuzz/tests/fuzz/fuzz_*; do
            if [ -x "$fuzzer" ]; then
              echo "Running $fuzzer for 60s..."
              timeout 60 "$fuzzer" -max_total_time=60 || true
            fi
          done

  pico-cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Raspberry Pi Pico SDK dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential
          git clone --depth 1 --branch master https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk && git submodule update --init
      - name: Configure CMake
        run: PICO_SDK_PATH=~/pico-sdk cmake -S . -B build/pico -DMUC_OPCUA_PLATFORM=pico -DMUC_OPCUA_BUILD_EXAMPLES=ON -DMUC_OPCUA_PROFILE=full
      - name: Build
        run: cmake --build build/pico || true

  freestanding-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ARM toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi
      - name: Compile core sources with -ffreestanding (no libc/OS)
        run: |
          # Verify the portable core (everything but the host-only platform
          # adapters) builds for a bare-metal, freestanding ARM target. Catches a
          # hosted-header dependency regression leaking into the core.
          set -e
          for f in $(find src -name '*.c' -not -path 'src/platform/host_*' \
            -not -path 'src/client/client_subscription*' \
            -not -path 'src/client/client_monitored_item*' \
            -not -path 'src/client/client_publish*' \
            -not -path 'src/client/client_write*' \
            -not -path 'src/client/client_call*'); do
            echo "freestanding: $f"
            arm-none-eabi-gcc -ffreestanding -ffunction-sections -fdata-sections \
              -std=c11 -Iinclude -Isrc -Wall -Wextra -Werror \
              -c "$f" -o /dev/null
          done

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential gcovr
      - name: Configure CMake (coverage)
        run: cmake -S . -B build/coverage -DCMAKE_C_FLAGS="--coverage" -DCMAKE_EXE_LINKER_FLAGS="--coverage" -DMUC_OPCUA_BUILD_TESTS=ON -DMUC_OPCUA_PLATFORM=host -DMUC_OPCUA_PROFILE=standard
      - name: Build
        run: cmake --build build/coverage
      - name: Test
        run: ctest --test-dir build/coverage --output-on-failure
      - name: Generate coverage report
        run: gcovr -r . --xml -o coverage.xml
      - name: Generate HTML coverage report
        run: gcovr -r . --html-details coverage.html
