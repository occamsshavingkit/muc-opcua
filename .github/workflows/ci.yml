name: CI

on:
  push:
    branches: [ main, "001-minimal-embedded-server" ]
  pull_request:
    branches: [ main, "001-minimal-embedded-server" ]

jobs:
  host-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential cppcheck clang-tidy clang-format libssl-dev
      - name: Configure CMake
        run: cmake -S . -B build/host -DMICRO_OPCUA_BUILD_TESTS=ON -DMICRO_OPCUA_BUILD_EXAMPLES=ON -DMICRO_OPCUA_PLATFORM=host
      - name: Build
        run: cmake --build build/host
      - name: Test
        run: ctest --test-dir build/host --output-on-failure

  interop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y cmake build-essential python3-venv
          python3 -m venv /tmp/venv && /tmp/venv/bin/pip install --quiet asyncua
      - name: Build host example
        run: cmake -S . -B build/host -DMICRO_OPCUA_BUILD_EXAMPLES=ON -DMICRO_OPCUA_PLATFORM=host && cmake --build build/host --target minimal_server
      - name: Interop smoke test (asyncua client)
        run: PATH="/tmp/venv/bin:$PATH" tests/interop/run_interop.sh

  dotnet-interop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential libssl-dev
      - name: Build host example
        run: cmake -S . -B build/host -DMICRO_OPCUA_BUILD_EXAMPLES=ON -DMICRO_OPCUA_PLATFORM=host && cmake --build build/host --target minimal_server
      - name: OPC Foundation .NET reference-client interop
        run: tests/interop/run_interop_dotnet.sh

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang-format cppcheck clang-tidy libssl-dev
      - name: Configure CMake
        run: cmake -S . -B build/host -DMICRO_OPCUA_BUILD_TESTS=ON -DMICRO_OPCUA_PLATFORM=host
      - name: Format Check
        run: cmake --build build/host --target format-check || true
      - name: CppCheck
        run: cmake --build build/host --target cppcheck || true
      - name: Clang-Tidy
        run: cmake --build build/host --target clang-tidy || true

  sanitizer-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang libssl-dev
      - name: Configure CMake
        run: CC=clang CXX=clang++ cmake -S . -B build/asan -DMICRO_OPCUA_BUILD_TESTS=ON -DMICRO_OPCUA_SANITIZERS="address,undefined" -DMICRO_OPCUA_PLATFORM=host
      - name: Build
        run: cmake --build build/asan
      - name: Test
        run: ctest --test-dir build/asan --output-on-failure || true

  fuzz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - name: Configure CMake
        run: CC=clang CXX=clang++ cmake -S . -B build/fuzz -DMICRO_OPCUA_BUILD_FUZZERS=ON -DMICRO_OPCUA_PLATFORM=host
      - name: Build
        run: cmake --build build/fuzz || true

  pico-cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Raspberry Pi Pico SDK dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential
          git clone --depth 1 --branch master https://github.com/raspberrypi/pico-sdk.git ~/pico-sdk
          cd ~/pico-sdk && git submodule update --init
      - name: Configure CMake
        run: PICO_SDK_PATH=~/pico-sdk cmake -S . -B build/pico -DMICRO_OPCUA_PLATFORM=pico -DMICRO_OPCUA_BUILD_EXAMPLES=ON
      - name: Build
        run: cmake --build build/pico || true
