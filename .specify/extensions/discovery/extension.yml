schema_version: "1.0"

extension:
  id: "discovery"
  name: "Spec Kit Discovery Extension"
  version: "0.2.0"
  description: "Run technical discovery commands for feasibility, technology selection, scenario-specific technical decisions, legacy codebase assessment, implementation understanding, and proof-of-concept validation."
  author: "bigsmartben"
  repository: "https://github.com/bigsmartben/spec-kit-discovery"
  license: "MIT"
  homepage: "https://github.com/bigsmartben/spec-kit-discovery"
  category: "process"
  effect: "read-write"

requires:
  speckit_version: ">=0.1.0"
  commands:
    - "speckit.specify"

provides:
  commands:
    - name: "speckit.discovery.feasibility"
      file: "commands/feasibility.md"
      description: "Produces an evidence-backed feasibility study for a product or technical direction."
    - name: "speckit.discovery.techselect"
      file: "commands/techselect.md"
      description: "Builds a technology selection matrix for candidate tools, libraries, platforms, or architectures."
    - name: "speckit.discovery.codebase"
      file: "commands/codebase.md"
      description: "Assesses legacy codebase risks, reusable assets, constraints, and integration hazards."
    - name: "speckit.discovery.codebase-api-imp"
      file: "commands/codebase-api-imp.md"
      description: "Explains an implemented API or interface from repository facts for implementation understanding and defect localization."
    - name: "speckit.discovery.poc"
      file: "commands/poc.md"
      description: "Derives a bounded-scope proof-of-concept and runs it only when execution preconditions are met."
    - name: "speckit.discovery.decision"
      file: "commands/decision.md"
      description: "Evaluates a scenario-specific technical decision for API, performance, migration, UX, or compatibility risks before formal planning."

tags:
  - "discovery"
  - "feasibility"
  - "selection"
  - "codebase"
  - "api-implementation"
  - "poc"
  - "decision"
  - "api"
  - "performance"
  - "migration"
  - "ux"
  - "compatibility"
  - "workflow"
  - "validation"
