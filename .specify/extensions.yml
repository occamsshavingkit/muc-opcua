installed:
- cost
- doctor
- reconcile
- refine
- roadmap
- scope
- spec-validate
- squad
- status
- sync
- token-budget
settings:
  auto_execute_hooks: true
hooks:
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  - extension: branch-convention
    command: speckit.branch-convention.validate
    enabled: true
    optional: true
    prompt: Validate branch naming convention before creating new feature?
    description: Check naming convention compliance before /specify creates a new
      branch
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  - extension: token-budget
    command: speckit.token-budget.scope
    enabled: true
    optional: true
    priority: 10
    prompt: Scope a focused reading manifest for /speckit.plan?
    description: Scope reading manifest before planning
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  - extension: token-budget
    command: speckit.token-budget.scope
    enabled: true
    optional: true
    priority: 10
    prompt: Scope a focused reading manifest for /speckit.tasks?
    description: Scope reading manifest before task generation
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  - extension: roadmap
    command: speckit.roadmap.brief
    enabled: true
    optional: true
    priority: 10
    prompt: Review the roadmap for this spec before implementing?
    description: Surface the roadmap's expectations (outcome, scope, governing decisions,
      dependencies) for the spec about to be built
    condition: null
  - extension: spec-validate
    command: speckit.spec-validate.gate
    enabled: true
    optional: false
    priority: 10
    prompt: Execute speckit.spec-validate.gate?
    description: Hard gate implementation on validation and review policy
    condition: null
  - extension: token-budget
    command: speckit.token-budget.scope
    enabled: true
    optional: true
    priority: 10
    prompt: Scope a focused reading manifest for /speckit.implement?
    description: Scope reading manifest before implementation
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  - extension: roadmap
    command: speckit.roadmap.write
    enabled: true
    optional: true
    priority: 10
    prompt: Draft or update the spec roadmap now? (captures spec-specific decisions
      and future-spec intent from the constitution discussion)
    description: Capture a durable roadmap so constitution-phase decisions and not-yet-written-spec
      intent are not lost
    condition: null
  after_specify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  - extension: worktree
    command: speckit.worktree.create
    enabled: true
    optional: true
    prompt: Create an isolated worktree for this new feature?
    description: Auto-spawn a worktree after a new feature is specified
    condition: null
  - extension: squad
    command: speckit.squad.generate
    enabled: true
    optional: true
    priority: 10
    prompt: Spec updated — regenerate Squad agent definitions?
    description: Keeps Squad agents aligned as the spec evolves
    condition: null
  - extension: refine
    command: speckit.refine.status
    enabled: true
    optional: true
    priority: 10
    prompt: Check artifact sync status after specification?
    description: Show sync status after spec generation
    condition: null
  - extension: spec-validate
    command: speckit.spec-validate.validate
    enabled: true
    optional: true
    priority: 10
    prompt: Spec generated. Run comprehension validation now?
    description: Run spec validation after specification is generated
    condition: null
  - extension: token-budget
    command: speckit.token-budget.compact
    enabled: true
    optional: true
    priority: 10
    prompt: Compact spec.md to reduce tokens for /speckit.plan?
    description: Compact spec after specification
    condition: null
  - extension: scope
    command: speckit.scope.estimate
    enabled: true
    optional: true
    priority: 10
    prompt: Estimate effort for this spec?
    description: Auto-generate effort estimate after spec is written
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit clarification changes?
    description: Auto-commit after spec clarification
    condition: null
  after_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  - extension: architecture-guard
    command: speckit.architecture-guard.violation-detection
    enabled: true
    optional: true
    prompt: Would you like to scan the technical plan for architectural drift and
      Constitution violations?
    description: ''
    condition: null
  - extension: refine
    command: speckit.refine.status
    enabled: true
    optional: true
    priority: 10
    prompt: Check artifact sync status after planning?
    description: Show sync status after plan generation
    condition: null
  - extension: token-budget
    command: speckit.token-budget.compact
    enabled: true
    optional: true
    priority: 10
    prompt: Compact plan and design docs to reduce tokens for /speckit.tasks?
    description: Compact plan docs after planning
    condition: null
  after_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit task changes?
    description: Auto-commit after task generation
    condition: null
  - extension: agent-assign
    command: speckit.agent-assign.assign
    enabled: true
    optional: true
    prompt: Assign agents to the generated tasks?
    description: Automatically assign specialized agents to tasks after generation
    condition: null
  - extension: architecture-guard
    command: speckit.architecture-guard.refactor-generator
    enabled: true
    optional: true
    prompt: Would you like to generate architectural refactor tasks before implementation?
    description: ''
    condition: null
  - extension: squad
    command: speckit.squad.route
    enabled: true
    optional: true
    priority: 10
    prompt: Tasks generated — route them to Squad agents?
    description: Distributes new tasks to the right agents automatically
    condition: null
  - extension: spec-validate
    command: speckit.spec-validate.validate-tasks
    enabled: true
    optional: true
    priority: 10
    prompt: Tasks generated. Run task validation now?
    description: Run task validation after tasks are generated
    condition: null
  - extension: token-budget
    command: speckit.token-budget.compact
    enabled: true
    optional: true
    priority: 10
    prompt: Compact tasks.md to reduce tokens for /speckit.implement?
    description: Compact tasks after task generation
    condition: null
  after_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit implementation changes?
    description: Auto-commit after implementation
    condition: null
  - extension: architecture-guard
    command: speckit.architecture-guard.architecture-review
    enabled: true
    optional: true
    prompt: Would you like to run a post-implementation architecture review?
    description: ''
    condition: null
  - extension: verify-tasks
    command: speckit.verify-tasks.run
    enabled: true
    optional: true
    prompt: Run verify-tasks in a fresh session to check for phantom completions
    description: Post-implementation phantom completion detector
    condition: null
  - extension: cleanup
    command: speckit.cleanup.run
    enabled: true
    optional: true
    prompt: Run cleanup to review implementation changes and identify tech debt?
    description: Post-implementation quality gate
    condition: null
  - extension: roadmap
    command: speckit.roadmap.debrief
    enabled: true
    optional: true
    priority: 10
    prompt: Check the implementation against the roadmap?
    description: Verify the implemented spec matches its roadmap entry's outcome and
      scope
    condition: null
  - extension: sync
    command: speckit.sync.analyze
    enabled: true
    optional: true
    priority: 10
    prompt: Check for spec drift after implementation?
    description: ''
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
